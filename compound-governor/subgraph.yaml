specVersion: 0.0.4
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: Governor
    network: mainnet
    source:
      address: "0x690e775361AD66D1c4A25d89da9fCd639F5198eD"
      abi: Governor
      startBlock: 11863739
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - Governance
        - Proposal
        - Vote
        - TokenHolder
        - Delegate
        - Delegation
        - TokenDailySnapshot
        - VoteDailySnapshot
      abis:
        - name: Governor
          file: ./abis/radicle-governance/Governor.json
      eventHandlers:
        - event: ProposalCanceled(uint256)
          handler: handleProposalCanceled
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: ProposalExecuted(uint256)
          handler: handleProposalExecuted
        - event: ProposalQueued(uint256,uint256)
          handler: handleProposalQueued
        - event: VoteCast(address,uint256,bool,uint256)
          handler: handleVoteCast
      file: ./protocols/radicle-governance/src/Governor.ts
  - kind: ethereum/contract
    name: Token
    network: mainnet
    source:
      address: "0x31c8EAcBFFdD875c74b94b077895Bd78CF1E64A3"
      abi: Token
      startBlock: 11863739
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - Governance
        - Proposal
        - Vote
        - TokenHolder
        - Delegate
        - Delegation
        - TokenDailySnapshot
        - VoteDailySnapshot
      abis:
        - name: Token
          file: ./abis/radicle-governance/Token.json
      eventHandlers:
        - event: DelegateChanged(indexed address,indexed address,indexed address)
          handler: handleDelegateChanged
        - event: DelegateVotesChanged(indexed address,uint256,uint256)
          handler: handleDelegateVotesChanged
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
      file: ./protocols/radicle-governance/src/Token.ts
